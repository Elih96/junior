name: Evals

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - labeled

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: evals / gate
    runs-on: ubuntu-latest
    outputs:
      evals_changed: ${{ steps.changes.outputs.evals_changed }}
      evals_requested: ${{ steps.request.outputs.evals_requested }}
      gateway_ready: ${{ steps.secrets.outputs.gateway_ready }}
      sandbox_ready: ${{ steps.secrets.outputs.sandbox_ready }}
      should_run: ${{ steps.decision.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: request
        run: |
          set -euo pipefail

          action="$(jq -r '.action // ""' "$GITHUB_EVENT_PATH")"
          requested=false
          if [[ "$action" == "labeled" ]]; then
            if [[ "$(jq -r '.label.name // ""' "$GITHUB_EVENT_PATH")" == "trigger-evals" ]]; then
              requested=true
            fi
          elif jq -e '.pull_request.labels[]?.name | select(. == "trigger-evals")' "$GITHUB_EVENT_PATH" >/dev/null; then
            requested=true
          fi

          echo "evals_requested=$requested" >> "$GITHUB_OUTPUT"

      - uses: getsentry/action-filter-paths@98a158469c63115591d1c2952d34450838ab3bc1 # v0.1.0
        id: changes
        with:
          filters: |
            evals_changed:
              - packages/junior-evals/evals/**
              - packages/junior-evals/package.json
              - packages/junior-evals/global-setup.ts
              - packages/junior-evals/postgres-global-setup.ts
              - packages/junior-evals/src/**
              - packages/junior-evals/tests/**
              - packages/junior-evals/vitest.evals.config.ts
              - packages/junior/src/**

      - id: secrets
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          VERCEL_OIDC_TOKEN: ${{ secrets.VERCEL_OIDC_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail

          if [[ -n "${AI_GATEWAY_API_KEY:-}" || -n "${VERCEL_OIDC_TOKEN:-}" ]]; then
            echo "gateway_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "gateway_ready=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "${VERCEL_OIDC_TOKEN:-}" || ( -n "${VERCEL_TOKEN:-}" && -n "${VERCEL_TEAM_ID:-}" && -n "${VERCEL_PROJECT_ID:-}" ) ]]; then
            echo "sandbox_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "sandbox_ready=false" >> "$GITHUB_OUTPUT"
          fi

      - id: decision
        env:
          EVALS_CHANGED: ${{ steps.changes.outputs.evals_changed }}
          EVALS_REQUESTED: ${{ steps.request.outputs.evals_requested }}
          GATEWAY_READY: ${{ steps.secrets.outputs.gateway_ready }}
          SANDBOX_READY: ${{ steps.secrets.outputs.sandbox_ready }}
        run: |
          set -euo pipefail

          should_run=false
          if [[ "$GATEWAY_READY" == "true" && "$SANDBOX_READY" == "true" && ( "$EVALS_CHANGED" == "true" || "$EVALS_REQUESTED" == "true" ) ]]; then
            should_run=true
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          {
            echo "## Eval Gate"
            echo
            echo "- evals_changed: $EVALS_CHANGED"
            echo "- evals_requested: $EVALS_REQUESTED"
            echo "- gateway_ready: $GATEWAY_READY"
            echo "- sandbox_ready: $SANDBOX_READY"
            echo "- will_run: $should_run"
          } >> "$GITHUB_STEP_SUMMARY"

  evals:
    name: evals / suite
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: junior
          POSTGRES_PASSWORD: junior
          POSTGRES_DB: junior
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U junior -d junior"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JUNIOR_EVAL_REDIS_URL: redis://127.0.0.1:6379
      DATABASE_URL: postgres://junior:junior@localhost:5432/junior
      AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_OIDC_TOKEN: ${{ secrets.VERCEL_OIDC_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-pnpm
      - name: Install cloudflared
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            https://github.com/cloudflare/cloudflared/releases/download/2026.7.2/cloudflared-linux-amd64 \
            --output "$RUNNER_TEMP/cloudflared"
          echo "ec905ea7b7e327ff8abdde8cb64697a2152de74dbcdbf6aec9db8364eb3886cd  $RUNNER_TEMP/cloudflared" | sha256sum --check
          chmod +x "$RUNNER_TEMP/cloudflared"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/cloudflared" version
      - name: Verify eval egress lifecycle
        run: pnpm --filter @sentry/junior-evals test tests/integration/eval-egress.test.ts
      - name: Run evals
        env:
          VITEST_EVALS_REPORT_LEVEL: info
        run: pnpm --filter @sentry/junior-evals evals
      - name: Publish eval report
        if: always()
        uses: getsentry/vitest-evals@51b8efebcbe9532efc332bf1ff2abbae582bd093 # v0.15.0
        with:
          results: packages/junior-evals/vitest-results.json
